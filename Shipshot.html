<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Signal — App Store Growth Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function attachReactElementGuard() {
    const originalCreateElement = React.createElement;
    React.createElement = function patchedCreateElement(type, ...rest) {
      if (type === undefined || type === null) {
        const props = rest[0] || {};
        const hint = props && typeof props === 'object' ? Object.keys(props).join(', ') : '';
        throw new Error(`Undefined React element type while rendering. Props keys: ${hint || 'none'}`);
      }
      return originalCreateElement.call(this, type, ...rest);
    };
  })();
</script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/security.jsx"></script>
<script type="text/babel" src="components/error-boundary.jsx"></script>
<script type="text/babel" src="lib/supabase.js"></script>
<script type="text/babel" src="lib/workspace.js"></script>
<script type="text/babel" src="components/auth.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/credits.js"></script>
<script type="text/babel" src="components/screenshot.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/projects.jsx"></script>
<script type="text/babel" src="components/project-screens.jsx"></script>
<script type="text/babel" src="components/other-screens.jsx"></script>
<script type="text/babel" src="components/wrap-screens.jsx"></script>

<script type="text/babel" data-presets="react">
const _useState_app = React.useState, _useEffect_app = React.useEffect;

function editorRouteFromLocation() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('editor') !== '1') return null;
    const projectId = params.get('projectId');
    if (!projectId) return null;
    return {
      editorOnly: true,
      route: {
        screen: 'project',
        projectId,
        tab: 'edit',
      },
    };
  } catch {
    return null;
  }
}

const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "lime",
  "density": "comfortable",
  "screen": "home"
}/*EDITMODE-END*/;

function App() {
  const editorSession = editorRouteFromLocation();
  const saved = (() => { try { return JSON.parse(localStorage.getItem('shipshot-route') || 'null'); } catch { return null; } })();
  const initialRoute = (editorSession && editorSession.route) || saved || { screen: TWEAKS.screen || 'discover' };
  const normalizedRoute = ['home', 'projects', 'templates', 'assets', 'exports'].includes(initialRoute.screen)
    ? { screen: initialRoute.screen === 'home' ? 'discover' : initialRoute.screen === 'projects' ? 'search' : initialRoute.screen === 'templates' ? 'trending' : initialRoute.screen === 'assets' ? 'favorites' : 'app-tracking' }
    : initialRoute;
  const [route, setRoute] = _useState_app(normalizedRoute);
  const [tweaks, setTweaks] = _useState_app(TWEAKS);
  const [editMode, setEditMode] = _useState_app(false);
  const [workspace, setWorkspace] = _useState_app(() => window.SHIPSHOT.defaultWorkspace());
  const [workspaceLoaded, setWorkspaceLoaded] = _useState_app(false);
  const [sidebarCollapsed, setSidebarCollapsed] = _useState_app(() => {
    try { return JSON.parse(localStorage.getItem('shipshot-sidebar-collapsed') || 'false'); } catch { return false; }
  });
  const [creditsState, setCreditsState] = _useState_app(() => window.SHIPSHOT_CREDITS.getCreditsState());
  const [creditsPanelOpen, setCreditsPanelOpen] = _useState_app(false);
  const [creditsToast, setCreditsToast] = _useState_app(null);
  const [insufficientCredits, setInsufficientCredits] = _useState_app(null);
  const editorOnly = Boolean(editorSession?.editorOnly);

  const data = window.SHIPSHOT.buildData(workspace);
  window.DATA = data;
  window.__shipshotSetRoute = setRoute;

  // Load workspace on mount
  _useEffect_app(() => {
    window.SHIPSHOT.loadWorkspace().then((loaded) => {
      setWorkspace(loaded);
      setWorkspaceLoaded(true);
    });
  }, []);

  // Listen for workspace sync from auth
  _useEffect_app(() => {
    window.onWorkspaceLoaded = (loaded) => {
      setWorkspace(loaded);
      setWorkspaceLoaded(true);
    };
    return () => { window.onWorkspaceLoaded = null; };
  }, []);

  _useEffect_app(() => {
    if (editorOnly) return;
    localStorage.setItem('shipshot-route', JSON.stringify(route));
  }, [route, editorOnly]);
  _useEffect_app(() => {
    if (workspaceLoaded) {
      window.SHIPSHOT.saveWorkspace(workspace);
    }
  }, [workspace, workspaceLoaded]);
  _useEffect_app(() => { localStorage.setItem('shipshot-sidebar-collapsed', JSON.stringify(sidebarCollapsed)); }, [sidebarCollapsed]);
  _useEffect_app(() => {
    const syncCredits = () => setCreditsState(window.SHIPSHOT_CREDITS.getCreditsState());
    window.addEventListener('shipshot:credits-updated', syncCredits);
    return () => window.removeEventListener('shipshot:credits-updated', syncCredits);
  }, []);

  _useEffect_app(() => {
    if (!creditsToast) return;
    const id = setTimeout(() => setCreditsToast(null), 4000);
    return () => clearTimeout(id);
  }, [creditsToast]);

  _useEffect_app(() => {
    const plan = window.SHIPSHOT_CREDITS.PLANS[creditsState.plan] || window.SHIPSHOT_CREDITS.PLANS.maker;
    const allocation = window.SHIPSHOT_CREDITS.monthlyAllocation(creditsState.plan);
    if (!allocation) return;
    const ratio = creditsState.balance / allocation;
    if (ratio < 0.2) {
      setCreditsToast({
        tone: 'warn',
        message: `⚠️ Low credits — ${creditsState.balance} left on ${plan.label}`,
      });
      return;
    }
    if (creditsState.renewsAt) {
      const days = Math.ceil((new Date(creditsState.renewsAt).getTime() - Date.now()) / 86400000);
      if (days > 0 && days <= 3) {
        setCreditsToast({
          tone: 'neutral',
          message: `Credits renew in ${days} day${days === 1 ? '' : 's'}.`,
        });
        return;
      }
    }
    if (creditsState.balance >= window.SHIPSHOT_CREDITS.rolloverCap(creditsState.plan) && plan.renewable) {
      setCreditsToast({
        tone: 'neutral',
        message: 'You are at the maximum rollover credit cap.',
      });
    }
  }, []);

  _useEffect_app(() => {
    const onMsg = (e) => {
      // Security: Only accept messages from same origin
      if (e.origin !== window.location.origin) return;
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    // Send to parent only if in iframe and same origin
    if (window.parent !== window && window.location.ancestorOrigins?.[0] === window.location.origin) {
      window.parent.postMessage({ type: '__edit_mode_available' }, window.location.origin);
    }
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const applyTweaks = (edits) => {
    const next = { ...tweaks, ...edits };
    setTweaks(next);
    if (window.parent !== window) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, window.location.origin);
    }
  };

  const accentMap = { lime: undefined, violet: 'violet', amber: 'amber', cyan: 'cyan' };

  const { PROJECTS } = data;
  const project = route.projectId ? PROJECTS.find(p => p.id === route.projectId) : null;

  const buildEditorUrl = (projectId) => {
    const url = new URL(window.location.href);
    url.searchParams.set('editor', '1');
    url.searchParams.set('projectId', projectId);
    url.searchParams.set('tab', 'edit');
    return url.toString();
  };

  const openProjectEditor = (projectId) => {
    if (!projectId) return;
    window.open(buildEditorUrl(projectId), '_blank', 'noopener,noreferrer');
  };

  _useEffect_app(() => {
    if (route.screen !== 'project' || !route.projectId || project) return;
    if (editorOnly) {
      try {
        localStorage.setItem('shipshot-route', JSON.stringify({ screen: 'my-projects' }));
      } catch {}
      window.location.replace(window.location.pathname);
      return;
    }
    setRoute({ screen: 'my-projects' });
  }, [route.screen, route.projectId, project, PROJECTS.length, editorOnly]);

  const createProject = (input) => {
    const created = window.SHIPSHOT.createProjectFromInput(workspace, input);
    setWorkspace(created.workspace);
    return created;
  };

  const openCreditsPanel = () => setCreditsPanelOpen(true);
  const closeCreditsPanel = () => setCreditsPanelOpen(false);

  const showInsufficientCreditsModal = (cost, label = 'This action') => {
    const balance = window.SHIPSHOT_CREDITS.getCredits().balance;
    setInsufficientCredits({
      cost,
      balance,
      missing: Math.max(0, cost - balance),
      label,
    });
  };

  const refreshCredits = () => setCreditsState(window.SHIPSHOT_CREDITS.getCreditsState());

  const consumeCredits = (actions, meta = {}) => {
    const cost = window.SHIPSHOT_CREDITS.calcCost(actions);
    const result = window.SHIPSHOT_CREDITS.spendActions(actions, meta.actionLabel || 'AI action');
    if (!result.success) {
      showInsufficientCreditsModal(cost, meta.actionLabel || 'This action');
      refreshCredits();
      return { success: false, cost };
    }
    refreshCredits();
    const allocation = window.SHIPSHOT_CREDITS.monthlyAllocation(creditsState.plan);
    const remaining = result.newBalance;
    setCreditsToast({
      tone: remaining / Math.max(1, allocation) < 0.2 ? 'warn' : 'success',
      message: `${meta.successLabel || 'Action completed'} • −${cost} credits • ${remaining} left${remaining / Math.max(1, allocation) < 0.2 ? ' • ⚠️ Recharge soon' : ''}`,
    });
    return { success: true, cost, newBalance: result.newBalance };
  };

  _useEffect_app(() => {
    window.__shipshotCreditsUI = {
      openPanel: openCreditsPanel,
      closePanel: closeCreditsPanel,
      showInsufficient: showInsufficientCreditsModal,
      trySpend: consumeCredits,
      refresh: refreshCredits,
      getState: () => window.SHIPSHOT_CREDITS.getCreditsState(),
    };
    return () => {
      delete window.__shipshotCreditsUI;
    };
  }, [creditsState]);

  _useEffect_app(() => {
    window.__shipshotOpenProjectEditor = openProjectEditor;
    return () => {
      delete window.__shipshotOpenProjectEditor;
    };
  }, []);

  _useEffect_app(() => {
    window.__shipshotBuildEditorUrl = buildEditorUrl;
    return () => {
      delete window.__shipshotBuildEditorUrl;
    };
  }, []);

  _useEffect_app(() => {
    window.__shipshotUpdateWorkspace = (updater) => {
      setWorkspace((current) => {
        const next = typeof updater === 'function' ? updater(current) : current;
        return next || current;
      });
    };
    return () => {
      delete window.__shipshotUpdateWorkspace;
    };
  }, []);

  const queueGeneration = (projectId, prompt) => {
    if (!prompt.trim()) return;
    setWorkspace((current) => {
      const now = new Date().toISOString();
      return {
        ...current,
        generations: [
          {
            id: `gen-${Date.now().toString(36)}`,
            projectId,
            project: (current.projects.find((item) => item.id === projectId) || {}).name || 'Project',
            prompt: prompt.trim(),
            createdAt: now,
          },
          ...current.generations,
        ],
        projects: current.projects.map((item) => item.id === projectId ? {
          ...item,
          updatedAt: now,
          history: [
            { id: `history-${Date.now().toString(36)}`, when: now, label: 'Generation request saved locally' },
            ...(item.history || []),
          ],
        } : item),
      };
    });
  };

  const saveProject = (projectId, updater, historyLabel = 'Project updated') => {
    setWorkspace((current) => {
      const now = new Date().toISOString();
      return {
        ...current,
        projects: current.projects.map((item) => {
          if (item.id !== projectId) return item;
          const next = typeof updater === 'function' ? updater(item) : { ...item, ...updater };
          return {
            ...item,
            ...next,
            updatedAt: now,
            history: [
              { id: `history-${Date.now().toString(36)}`, when: now, label: historyLabel },
              ...(next.history || item.history || []),
            ],
          };
        }),
      };
    });
  };

  const crumbs = (() => {
    if (route.screen === 'discover') return [{ label: 'Discover', icon: <window.I.Compass /> }];
    if (route.screen === 'search') return [{ label: 'Explore', icon: <window.I.Search /> }];
    if (route.screen === 'trending') return [{ label: 'Trending', icon: <window.I.TrendingUp /> }];
    if (route.screen === 'market-insights') return [{ label: 'Market Insights', icon: <window.I.BarChart /> }];
    if (route.screen === 'keyword-explorer') return [{ label: 'Keywords', icon: <window.I.Key /> }];
    if (route.screen === 'aso-analyzer') return [{ label: 'ASO Analyzer', icon: <window.I.Target /> }];
    if (route.screen === 'screenshots') return [{ label: 'Screenshots', icon: <window.I.Image /> }];
    if (route.screen === 'reviews') return [{ label: 'Reviews', icon: <window.I.MessageSquare /> }];
    if (route.screen === 'app-tracking') return [{ label: 'App Tracking', icon: <window.I.Activity /> }];
    if (route.screen === 'rank-history') return [{ label: 'Rank History', icon: <window.I.LineChart /> }];
    if (route.screen === 'competitors') return [{ label: 'Competitors', icon: <window.I.Users /> }];
    if (route.screen === 'pricing') return [{ label: 'Pricing', icon: <window.I.DollarSign /> }];
    if (route.screen === 'revenue-insights') return [{ label: 'Revenue Insights', icon: <window.I.TrendingUp /> }];
    if (route.screen === 'hot-ideas') return [{ label: 'Hot Ideas', icon: <window.I.Lightbulb /> }];
    if (route.screen === 'idea-report') return [{ label: 'Hot Ideas', icon: <window.I.Lightbulb /> }, { label: route.ideaData?.name || 'Idea Report', icon: <window.I.FileText /> }];
    if (route.screen === 'idea-validator') return [{ label: 'Idea Validator', icon: <window.I.CheckCircle /> }];
    if (route.screen === 'ai-agents') return [{ label: 'AI Agents', icon: <window.I.Sparkles /> }];
    if (route.screen === 'favorites') return [{ label: 'Favorites', icon: <window.I.Heart /> }];
    if (route.screen === 'my-apps') return [{ label: 'My Apps', icon: <window.I.Smartphone /> }];
    if (route.screen === 'my-projects') return [{ label: 'My Projects', icon: <window.I.Folder /> }];
    if (route.screen === 'project' && project) return [
      { label: 'Projects', icon: <window.I.Folder /> },
      { label: project.name },
      { label: (window.DATA.PROJECT_TABS.find(t => t.id === route.tab) || {}).label || 'Overview' },
    ];
    if (route.screen === 'app-detail') return [{ label: 'Apps', icon: <window.I.Folder /> }, { label: route.appId || 'App' }];
    if (route.screen === 'settings') return [{ label: 'Settings', icon: <window.I.Settings /> }];
    return [];
  })();

  return (
    <window.ErrorBoundary>
      <div data-theme={tweaks.theme} data-accent={accentMap[tweaks.accent]} data-density={tweaks.density} style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg-0)' }}>
        {!editorOnly && <window.Sidebar route={route} setRoute={setRoute} collapsed={sidebarCollapsed} onToggleCollapse={() => setSidebarCollapsed((value) => !value)} />}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          {!editorOnly && <window.TopBar route={route} crumbs={crumbs} right={<>
            <button className="btn icon sm"><window.I.RotateCw /></button>
            <div style={{ width: 34, height: 34, borderRadius: 999, background: 'var(--accent)', color: 'var(--accent-fg)', display: 'grid', placeItems: 'center', fontWeight: 700 }}>S</div>
          </>} sidebarCollapsed={sidebarCollapsed} onToggleSidebar={() => setSidebarCollapsed((value) => !value)} />}
          <div style={{ flex: 1, overflow: editorOnly ? 'hidden' : 'auto' }}>
            {route.screen === 'discover' && !editorOnly && <window.WrapDiscoverScreen setRoute={setRoute} />}
            {route.screen === 'search' && !editorOnly && <window.WrapSearchScreen setRoute={setRoute} />}
            {route.screen === 'trending' && !editorOnly && <window.WrapTrendingScreen setRoute={setRoute} />}
            {route.screen === 'market-insights' && !editorOnly && <window.WrapMarketInsightsScreen setRoute={setRoute} />}
            {route.screen === 'keyword-explorer' && !editorOnly && <window.WrapKeywordExplorerScreen setRoute={setRoute} />}
            {route.screen === 'aso-analyzer' && !editorOnly && <window.WrapASOAnalyzerScreen setRoute={setRoute} />}
            {route.screen === 'screenshots' && !editorOnly && <window.WrapScreenshotsScreen setRoute={setRoute} />}
            {route.screen === 'reviews' && !editorOnly && <window.WrapReviewsScreen setRoute={setRoute} />}
            {route.screen === 'app-tracking' && !editorOnly && <window.WrapAppTrackingScreen setRoute={setRoute} />}
            {route.screen === 'rank-history' && !editorOnly && <window.WrapRankHistoryScreen setRoute={setRoute} />}
            {route.screen === 'competitors' && !editorOnly && <window.WrapCompetitorsScreen setRoute={setRoute} />}
            {route.screen === 'pricing' && !editorOnly && <window.WrapPricingScreen setRoute={setRoute} />}
            {route.screen === 'revenue-insights' && !editorOnly && <window.WrapRevenueInsightsScreen setRoute={setRoute} />}
            {route.screen === 'hot-ideas' && !editorOnly && <window.WrapHotIdeasScreen setRoute={setRoute} />}
            {route.screen === 'idea-report' && !editorOnly && <window.WrapIdeaReportScreen setRoute={setRoute} route={route} />}
            {route.screen === 'idea-validator' && !editorOnly && <window.WrapIdeaValidatorScreen setRoute={setRoute} />}
            {route.screen === 'ai-agents' && !editorOnly && <window.WrapAIAgentsScreen setRoute={setRoute} />}
            {route.screen === 'favorites' && !editorOnly && <window.WrapFavoritesScreen setRoute={setRoute} />}
            {route.screen === 'my-apps' && !editorOnly && <window.WrapMyAppsScreen setRoute={setRoute} />}
            {route.screen === 'my-projects' && !editorOnly && <window.WrapMyProjectsScreen setRoute={setRoute} />}
            {route.screen === 'app-detail' && !editorOnly && <window.WrapAppDetailScreen route={route} setRoute={setRoute} />}
            {route.screen === 'project' && <window.ProjectScreen projectId={route.projectId} tab={route.tab} setRoute={setRoute} onQueueGeneration={queueGeneration} onSaveProject={saveProject} openEditorTab={openProjectEditor} />}
            {route.screen === 'settings' && !editorOnly && <window.SettingsScreen setRoute={setRoute} />}
          </div>
        </div>

        {editMode && !editorOnly && <TweaksPanel tweaks={tweaks} apply={applyTweaks} route={route} setRoute={setRoute} />}
        <window.CreditsPanel open={creditsPanelOpen} credits={creditsState} onClose={closeCreditsPanel} />
        <window.CreditsToast toast={creditsToast} onOpen={openCreditsPanel} />
        <window.InsufficientCreditsModal
          data={insufficientCredits}
          onClose={() => setInsufficientCredits(null)}
          onBuy={() => {
            window.SHIPSHOT_CREDITS.addCredits(15);
            refreshCredits();
            setInsufficientCredits(null);
            setCreditsToast({ tone: 'success', message: 'Boost pack added • +15 credits' });
          }}
          onUpgrade={() => {
            window.SHIPSHOT_CREDITS.setPlan('studio');
            refreshCredits();
            setInsufficientCredits(null);
            setCreditsToast({ tone: 'success', message: 'Plan upgraded to Studio' });
          }}
        />
      </div>
    </window.ErrorBoundary>
  );
}

function TweaksPanel({ tweaks, apply, route, setRoute }) {
  return (
    <div style={{
      position: 'fixed', right: 16, bottom: 16, width: 280, zIndex: 1000,
      background: 'var(--bg-1)', border: '1px solid var(--border-2)', borderRadius: 12,
      boxShadow: 'var(--shadow-lg)', padding: 14,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 500, display: 'inline-flex', gap: 6, alignItems: 'center' }}><window.I.Bolt /> Tweaks</div>
      </div>

      <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Jump to</div>
      <select className="input" value={route.screen} onChange={e => setRoute({ screen: e.target.value, projectId: window.DATA.PROJECTS[0]?.id, tab: 'overview' })} style={{ marginBottom: 12 }}>
        <option value="home">Home dashboard</option>
        <option value="projects">Projects list</option>
        <option value="new-project">New project flow</option>
        <option value="project">Project workspace</option>
        <option value="templates">Templates</option>
        <option value="assets">Assets</option>
        <option value="exports">Exports</option>
        <option value="settings">Settings</option>
      </select>

      {route.screen === 'project' && (
        <>
          <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Project tab</div>
          <div className="seg" style={{ width: '100%', marginBottom: 12, flexWrap: 'wrap' }}>
            {window.DATA.PROJECT_TABS.map(t => <button key={t.id} className={route.tab===t.id?'on':''} onClick={()=>setRoute({...route, tab:t.id})} style={{ flex: 1 }}>{t.label}</button>)}
          </div>
        </>
      )}

      <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Theme</div>
      <div className="seg" style={{ width: '100%', marginBottom: 12 }}>
        <button className={tweaks.theme==='dark'?'on':''} onClick={()=>apply({theme:'dark'})} style={{ flex:1 }}>Dark</button>
        <button className={tweaks.theme==='light'?'on':''} onClick={()=>apply({theme:'light'})} style={{ flex:1 }}>Light</button>
      </div>

      <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Accent</div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
        {[['lime','oklch(84% 0.18 130)'],['violet','oklch(72% 0.17 285)'],['amber','oklch(82% 0.16 75)'],['cyan','oklch(82% 0.13 210)']].map(([k, c]) => (
          <button key={k} onClick={() => apply({accent: k})} style={{ width: 32, height: 32, borderRadius: 8, background: c, border: tweaks.accent===k ? '2px solid var(--text-1)' : '1px solid var(--border-2)' }} />
        ))}
      </div>

      <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Density</div>
      <div className="seg" style={{ width: '100%' }}>
        <button className={tweaks.density==='comfortable'?'on':''} onClick={()=>apply({density:'comfortable'})} style={{ flex:1 }}>Comfortable</button>
        <button className={tweaks.density==='compact'?'on':''} onClick={()=>apply({density:'compact'})} style={{ flex:1 }}>Compact</button>
      </div>
    </div>
  );
}

function AppWithAuth() {
  const [workspace, setWorkspace] = _useState_app(() => window.SHIPSHOT.defaultWorkspace());

  const handleWorkspaceSync = (syncedWorkspace) => {
    setWorkspace(syncedWorkspace);
    window.DATA = window.SHIPSHOT.buildData(syncedWorkspace);
  };

  return (
    <window.AuthProvider onWorkspaceSync={handleWorkspaceSync}>
      <App />
    </window.AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWithAuth />);
</script>
